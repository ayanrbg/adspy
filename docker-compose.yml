version: "3.9"

services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: adspy
      POSTGRES_PASSWORD: adspy
      POSTGRES_DB: adspy
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  elasticsearch:
    image: elasticsearch:8.14.0
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - "ES_JAVA_OPTS=-Xms512m -Xmx512m"
    ports:
      - "9200:9200"
    volumes:
      - esdata:/usr/share/elasticsearch/data

  api:
    build: .
    command: uvicorn adspy.api.main:app --host 0.0.0.0 --port 8000 --reload
    ports:
      - "8000:8000"
    env_file:
      - .env
    depends_on:
      - postgres
      - redis
      - elasticsearch

  worker:
    build: .
    command: celery -A adspy.workers.celery_app worker --loglevel=info
    env_file:
      - .env
    depends_on:
      - redis
      - postgres
      - elasticsearch

  beat:
    build: .
    command: celery -A adspy.workers.celery_app beat --loglevel=info
    env_file:
      - .env
    depends_on:
      - redis

volumes:
  pgdata:
  esdata:
